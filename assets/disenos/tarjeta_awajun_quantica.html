<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWAJÚN — Interfaz Cuántica</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --rojo:       #ff0000;
      --rojo-dim:   rgba(255,0,0,0.15);
      --rojo-glow:  rgba(255,0,0,0.6);
      --blanco:     #ffffff;
      --gris:       #444;
      --negro:      #000000;
      --pulso:      2.8s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050505;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Share Tech Mono', monospace;
      perspective: 1600px;
      overflow: hidden;
    }

    /* ─── ESCENA 3D ─── */
    .escena {
      transform-style: preserve-3d;
    }

    /* ─── TARJETA ─── */
    .tarjeta {
      width: 720px;
      height: 380px;
      background: radial-gradient(ellipse at 30% 50%, #0d150d 0%, #030303 65%);
      border-radius: 36px;
      border: 1px solid rgba(255,0,0,0.12);
      display: flex;
      flex-direction: column;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.08s ease-out;
      box-shadow:
        0 0 0 1px rgba(255,0,0,0.06),
        0 40px 80px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    /* ─── REFLEJO GLASS ─── */
    .glass {
      position: absolute;
      inset: 0;
      border-radius: 36px;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 10;
    }

    /* ─── BORDES ZIGZAG ─── */
    .borde-svg {
      width: 100%;
      height: 56px;
      overflow: visible;
      display: block;
      flex-shrink: 0;
    }

    .linea-base  { stroke: var(--rojo); stroke-width: 2.5; fill: none; opacity: 0.18; }
    .linea-negro { stroke: var(--negro); stroke-width: 6; fill: none; }
    .linea-glow  {
      stroke: var(--rojo);
      stroke-width: 3.5;
      fill: none;
      stroke-dasharray: 60 900;
      stroke-dashoffset: 0;
    }
    .glow-top    { animation: sweep-top  6s linear infinite; }
    .glow-bot    { animation: sweep-bot  6s linear infinite reverse; }

    @keyframes sweep-top { to { stroke-dashoffset: -960; } }
    @keyframes sweep-bot { to { stroke-dashoffset: -960; } }

    /* ─── CUERPO ─── */
    .cuerpo {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 55px;
      gap: 40px;
    }

    /* ─── NÚCLEO SVG ─── */
    .wrap-nucleo {
      flex: 0 0 200px;
      height: 200px;
      transform: translateZ(45px);
    }

    .svg-nucleo {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Anillos sutiles */
    .anillo { fill: none; stroke: white; stroke-width: 1; opacity: 0.12; }

    /* Estrella dentada — generada por JS */
    .estrella-dentada {
      fill: none;
      stroke: var(--rojo);
      stroke-width: 2.2;
      stroke-linejoin: miter;
      animation: pulsar var(--pulso) ease-in-out infinite;
    }

    /* Puntos orbitales */
    .punto-orbital {
      fill: var(--rojo);
      animation: rotar-orbita 22s linear infinite;
      transform-origin: 100px 100px;
    }

    /* Núcleo central */
    .nucleo-centro {
      animation: latir var(--pulso) ease-in-out infinite;
      transform-origin: 100px 100px;
    }

    @keyframes pulsar {
      0%,100% { opacity: 0.45; filter: drop-shadow(0 0 4px var(--rojo)); }
      14%     { opacity: 1;    filter: drop-shadow(0 0 14px var(--rojo)) brightness(1.4); }
    }
    @keyframes rotar-orbita {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes latir {
      0%,100% { transform: scale(1); filter: drop-shadow(0 0 4px var(--rojo)); }
      14%     { transform: scale(1.18); filter: drop-shadow(0 0 18px var(--rojo)); }
    }

    /* ─── TEXTO ─── */
    .col-texto {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .etiqueta-top {
      color: var(--rojo);
      font-size: 0.65rem;
      letter-spacing: 5px;
      opacity: 0.7;
      text-transform: uppercase;
    }

    .titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5.2rem;
      color: var(--blanco);
      letter-spacing: 14px;
      line-height: 1;
      text-shadow: 0 0 30px rgba(255,255,255,0.08);
    }

    .divisor {
      width: 140px;
      height: 2px;
      background: linear-gradient(90deg, var(--rojo) 0%, transparent 100%);
      box-shadow: 0 0 12px var(--rojo-glow);
      opacity: 0.8;
    }

    .tagline {
      color: #555;
      font-size: 0.68rem;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .datos {
      display: flex;
      gap: 20px;
      margin-top: 4px;
    }

    .dato {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .dato-num {
      color: var(--rojo);
      font-size: 1rem;
      letter-spacing: 2px;
    }
    .dato-lab {
      color: #333;
      font-size: 0.55rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ─── MARCADOR ESQUINA ─── */
    .esquina {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--rojo);
      border-style: solid;
      opacity: 0.5;
    }
    .esq-tl { top: 16px; left: 22px; border-width: 1.5px 0 0 1.5px; }
    .esq-tr { top: 16px; right: 22px; border-width: 1.5px 1.5px 0 0; }
    .esq-bl { bottom: 16px; left: 22px; border-width: 0 0 1.5px 1.5px; }
    .esq-br { bottom: 16px; right: 22px; border-width: 0 1.5px 1.5px 0; }

    /* ─── PARTÍCULAS DE FONDO ─── */
    .bg-dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body>

  <!-- Fondo punteado muy sutil -->
  <canvas class="bg-dots" id="bgCanvas"></canvas>

  <div class="escena" id="escena">
    <div class="tarjeta" id="tarjeta">
      <div class="glass"></div>

      <!-- Marcadores de esquina -->
      <div class="esquina esq-tl"></div>
      <div class="esquina esq-tr"></div>
      <div class="esquina esq-bl"></div>
      <div class="esquina esq-br"></div>

      <!-- BORDE SUPERIOR -->
      <svg class="borde-svg" viewBox="0 0 720 56" preserveAspectRatio="none">
        <defs>
          <path id="zz-top"
            d="M0 40 L30 16 L60 40 L90 16 L120 40 L150 16 L180 40 L210 16 L240 40
               L270 16 L300 40 L330 16 L360 40 L390 16 L420 40 L450 16 L480 40
               L510 16 L540 40 L570 16 L600 40 L630 16 L660 40 L690 16 L720 40"/>
        </defs>
        <use href="#zz-top" class="linea-base" />
        <use href="#zz-top" class="linea-negro" />
        <use href="#zz-top" class="linea-glow glow-top" />
      </svg>

      <!-- CUERPO CENTRAL -->
      <div class="cuerpo">

        <!-- Núcleo geométrico -->
        <div class="wrap-nucleo">
          <svg viewBox="0 0 200 200" class="svg-nucleo" id="svgNucleo">
            <!-- Anillos -->
            <circle cx="100" cy="100" r="93" class="anillo" />
            <circle cx="100" cy="100" r="72" class="anillo" style="opacity:.07" />

            <!-- Estrella dentada — path generado por JS -->
            <path id="dientesPath" class="estrella-dentada" />

            <!-- Puntos orbitales -->
            <g class="punto-orbital" id="puntosOrbitales"></g>

            <!-- Núcleo central -->
            <g class="nucleo-centro">
              <circle cx="100" cy="100" r="7" fill="#ff0000" />
              <circle cx="100" cy="100" r="3" fill="#000" />
            </g>
          </svg>
        </div>

        <!-- Columna de texto -->
        <div class="col-texto">
          <span class="etiqueta-top">// sistema activo</span>
          <h1 class="titulo">AWAJÚN</h1>
          <div class="divisor"></div>
          <p class="tagline">Geometría &amp; Tradición</p>
          <div class="datos">
            <div class="dato">
              <span class="dato-num">14</span>
              <span class="dato-lab">Nodos</span>
            </div>
            <div class="dato">
              <span class="dato-num">∞</span>
              <span class="dato-lab">Ciclos</span>
            </div>
            <div class="dato">
              <span class="dato-num">01</span>
              <span class="dato-lab">Origen</span>
            </div>
          </div>
        </div>

      </div>

      <!-- BORDE INFERIOR -->
      <svg class="borde-svg" viewBox="0 0 720 56" preserveAspectRatio="none">
        <defs>
          <path id="zz-bot"
            d="M0 16 L30 40 L60 16 L90 40 L120 16 L150 40 L180 16 L210 40 L240 16
               L270 40 L300 16 L330 40 L360 16 L390 40 L420 16 L450 40 L480 16
               L510 40 L540 16 L570 40 L600 16 L630 40 L660 16 L690 40 L720 16"/>
        </defs>
        <use href="#zz-bot" class="linea-base" />
        <use href="#zz-bot" class="linea-negro" />
        <use href="#zz-bot" class="linea-glow glow-bot" />
      </svg>

    </div>
  </div>

  <script>
    /* ── GENERA LA ESTRELLA DENTADA ── */
    function generarDientes(cx, cy, rExt, rInt, nDientes) {
      const pts = [];
      const total = nDientes * 2;
      for (let i = 0; i < total; i++) {
        const ang = (Math.PI * 2 * i) / total - Math.PI / 2;
        const r   = i % 2 === 0 ? rExt : rInt;
        pts.push([cx + r * Math.cos(ang), cy + r * Math.sin(ang)]);
      }
      return 'M ' + pts.map(p => p[0].toFixed(2) + ' ' + p[1].toFixed(2)).join(' L ') + ' Z';
    }

    document.getElementById('dientesPath').setAttribute('d',
      generarDientes(100, 100, 88, 66, 14)
    );

    /* ── GENERA PUNTOS ORBITALES ── */
    (function() {
      const g = document.getElementById('puntosOrbitales');
      const n = 12, r = 78;
      for (let i = 0; i < n; i++) {
        const ang = (Math.PI * 2 * i) / n;
        const x = 100 + r * Math.cos(ang);
        const y = 100 + r * Math.sin(ang);
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', x.toFixed(2));
        c.setAttribute('cy', y.toFixed(2));
        c.setAttribute('r', '4.5');
        c.setAttribute('fill', '#ff0000');
        g.appendChild(c);
      }
    })();

    /* ── INCLINACIÓN 3D ── */
    const tarjeta = document.getElementById('tarjeta');
    document.addEventListener('mousemove', e => {
      const ry = (window.innerWidth  / 2 - e.clientX) / 28;
      const rx = (window.innerHeight / 2 - e.clientY) / 28;
      tarjeta.style.transform = `rotateY(${ry}deg) rotateX(${rx}deg)`;
    });
    document.addEventListener('mouseleave', () => {
      tarjeta.style.transform = 'rotateY(0deg) rotateX(0deg)';
    });

    /* ── FONDO PUNTEADO SUTIL ── */
    (function() {
      const cv = document.getElementById('bgCanvas');
      const ctx = cv.getContext('2d');
      function resize() {
        cv.width  = window.innerWidth;
        cv.height = window.innerHeight;
        ctx.clearRect(0, 0, cv.width, cv.height);
        const sp = 40;
        for (let x = 0; x < cv.width;  x += sp)
        for (let y = 0; y < cv.height; y += sp) {
          ctx.beginPath();
          ctx.arc(x, y, 0.8, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,0,0,0.08)';
          ctx.fill();
        }
      }
      resize();
      window.addEventListener('resize', resize);
    })();
  </script>
<script>
/* ── Awajún self-scaling: adapts to any viewport/iframe size ── */
(function(){
  var SEL = '.tarjeta', NAT_W = 720, NAT_H = 380;
  // Fix body to exact viewport so the design doesn't overflow
  document.documentElement.style.height = '100%';
  document.body.style.cssText += ';height:100vh!important;overflow:hidden!important;';

  function _fit(){
    var el = document.querySelector(SEL);
    if(!el) return;
    var s = Math.min(window.innerWidth / NAT_W, window.innerHeight / NAT_H) * 0.94;
    el.style.transform       = 'scale(' + s + ')';
    el.style.transformOrigin = 'center center';
  }
  window.addEventListener('resize', _fit);
  [0, 60, 200, 500].forEach(function(t){ setTimeout(_fit, t); });
})();
</script>
</body>
</html>
