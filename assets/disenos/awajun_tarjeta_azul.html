<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awajún — Espíritu del Río</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;700&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:100vw; height:100vh;
  background:#020408;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}

#bg { position:fixed; inset:0; z-index:0; }

.scene { position:relative; z-index:1; }

/* ══ TARJETA ══ */
.card {
  position:relative;
  width:980px; height:380px;
  border-radius:14px;
  overflow:hidden;
  background:linear-gradient(145deg,#04080F 0%,#060A14 40%,#04070E 70%,#060A12 100%);
  border:1px solid rgba(0,140,255,0.18);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.9),
    0 0 55px rgba(0,120,255,0.1),
    0 0 55px rgba(200,20,10,0.07),
    0 28px 80px rgba(0,0,0,0.9);
  display:flex; flex-direction:row;
  animation:cardIn 1.1s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn {
  from { opacity:0; transform:scale(0.95) translateY(28px); }
  to   { opacity:1; transform:scale(1)    translateY(0); }
}

/* Línea superior degradada bicolor */
.card::before {
  content:'';
  position:absolute;
  top:0; left:5%; right:5%; height:1px;
  background:linear-gradient(to right,
    transparent,
    rgba(0,140,255,0.5) 30%,
    rgba(200,20,10,0.45) 70%,
    transparent);
  z-index:20;
}
.card::after {
  content:'';
  position:absolute;
  bottom:0; left:5%; right:5%; height:1px;
  background:linear-gradient(to right,
    transparent,
    rgba(200,20,10,0.4) 30%,
    rgba(0,140,255,0.45) 70%,
    transparent);
  z-index:20;
}

/* ══ PANEL IZQUIERDO — GEOMÉTRICO ══ */
.panel-left {
  width:300px; flex-shrink:0;
  position:relative;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:18px 20px;
  overflow:hidden;
  gap:12px;
}

/* Canvas de patrones geométricos Awajún */
#geoCvs {
  position:absolute; inset:0; z-index:0;
}

/* Títulos */
.label-top {
  position:relative; z-index:2;
  font-family:'Orbitron', sans-serif;
  font-size:.38rem; letter-spacing:8px;
  color:rgba(0,160,255,0.45);
  text-transform:uppercase; text-indent:8px;
  text-shadow:0 0 12px rgba(0,140,255,0.3);
}
.title-main {
  position:relative; z-index:2;
  font-family:'Cinzel', serif;
  font-size:1.45rem; font-weight:300;
  letter-spacing:6px;
  color:#E8F4FF;
  text-shadow:
    0 0 18px rgba(0,140,255,0.55),
    0 0 45px rgba(0,140,255,0.25);
  line-height:1.15;
  text-align:center;
}
.title-sub {
  position:relative; z-index:2;
  font-family:'Cinzel', serif;
  font-size:.65rem; font-weight:300;
  letter-spacing:5px;
  color:rgba(180,200,255,0.35);
  text-align:center;
}

/* Rombo decorativo central SVG pequeño */
.rombo-deco {
  position:relative; z-index:2;
  width:48px; height:48px;
}

/* Línea divisora izquierda */
.linea-h {
  position:relative; z-index:2;
  width:70%; height:1px;
  background:linear-gradient(to right,
    transparent,
    rgba(0,140,255,0.4) 40%,
    rgba(200,20,10,0.35) 60%,
    transparent);
}

.label-bot {
  position:relative; z-index:2;
  font-family:'Orbitron', sans-serif;
  font-size:.32rem; letter-spacing:6px;
  color:rgba(180,200,255,0.18);
  text-transform:uppercase; text-indent:6px;
  text-align:center;
}

/* ══ DIVISOR CENTRAL ══ */
.divider-v {
  position:absolute;
  left:300px; top:8%; bottom:8%; width:1px;
  background:linear-gradient(to bottom,
    transparent,
    rgba(0,140,255,0.3) 25%,
    rgba(200,20,10,0.3) 75%,
    transparent);
  z-index:10;
}

/* ══ PANEL DERECHO — RELOJ ══ */
.panel-right {
  flex:1;
  position:relative;
  display:flex; align-items:center; justify-content:center;
}

.clock-wrap {
  position:relative;
  width:340px; height:340px;
}
#clk { width:100%; height:100%; overflow:visible; }

/* Segundero late */
@keyframes sGlow {
  0%,100% { filter:drop-shadow(0 0 3px #E81A0A) drop-shadow(0 0 7px rgba(220,20,8,.45)); }
  50%     { filter:drop-shadow(0 0 9px #FF3020) drop-shadow(0 0 20px rgba(220,20,8,.75)); }
}
/* Estrella rota lento */
.starGroup { animation:starSpin 60s linear infinite; transform-origin:220px 220px; }
@keyframes starSpin { to{ transform:rotate(360deg); } }

/* Versión */
.version-txt {
  position:absolute;
  bottom:12px; left:50%;
  transform:translateX(-50%);
  font-family:'Orbitron',sans-serif;
  font-size:.38rem; letter-spacing:5px;
  color:rgba(0,140,255,0.35);
  white-space:nowrap;
}

/* Sparkle */
.sparkle {
  position:absolute; bottom:18px; right:20px;
  width:15px; height:15px; opacity:.4; z-index:5;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="scene">
<div class="card">

  <!-- ══ PANEL IZQUIERDO ══ -->
  <div class="panel-left">
    <canvas id="geoCvs"></canvas>

    <div class="label-top">Geometría Awajún</div>

    <div class="rombo-deco" style="width:38px;height:38px;">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="fRombo" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Rombos concéntricos bicolor -->
        <polygon points="24,2 46,24 24,46 2,24"
          fill="none" stroke="rgba(0,140,255,0.2)" stroke-width=".8"/>
        <polygon points="24,8 40,24 24,40 8,24"
          fill="none" stroke="rgba(0,140,255,0.5)" stroke-width="1"
          filter="url(#fRombo)"/>
        <polygon points="24,14 34,24 24,34 14,24"
          fill="rgba(200,20,10,0.25)" stroke="rgba(200,20,10,0.7)" stroke-width="1"
          filter="url(#fRombo)"/>
        <polygon points="24,19 29,24 24,29 19,24"
          fill="rgba(0,140,255,0.5)" stroke="rgba(0,180,255,0.9)" stroke-width=".8"
          filter="url(#fRombo)"/>
        <!-- Punto central -->
        <circle cx="24" cy="24" r="3.5"
          fill="rgba(200,20,10,0.9)" filter="url(#fRombo)"/>
        <circle cx="24" cy="24" r="1.5" fill="#FFCCBB"/>
      </svg>
    </div>

    <div class="title-main">AWAJÚN</div>
    <div class="title-sub">Espíritu del Río</div>

    <div class="linea-h"></div>
    <div class="label-bot">Bagua · Amazonas · Perú</div>
  </div>

  <!-- Divisor -->
  <div class="divider-v"></div>

  <!-- ══ PANEL DERECHO — RELOJ ══ -->
  <div class="panel-right">
    <div class="clock-wrap">
      <svg id="clk" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Fondo del reloj -->
          <radialGradient id="bgClk" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#0C1828"/>
            <stop offset="50%"  stop-color="#070E18"/>
            <stop offset="100%" stop-color="#030608"/>
          </radialGradient>

          <!-- Neon AZUL para anillos exteriores -->
          <filter id="neonB" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="4.5" result="b1"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b2"/>
            <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <!-- Neon ROJO para la estrella -->
          <filter id="neonR" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="4" result="b1"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b2"/>
            <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <filter id="neonSoft" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="haloExtB" x="-120%" y="-120%" width="340%" height="340%">
            <feGaussianBlur stdDeviation="20"/>
          </filter>
          <filter id="haloStarR" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="10"/>
          </filter>
          <filter id="shadHand" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="1.5" dy="2.5" stdDeviation="3.5" flood-color="rgba(0,0,0,0.95)"/>
          </filter>
          <filter id="neonSec" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Base -->
        <circle cx="220" cy="220" r="218" fill="#000"/>
        <circle cx="220" cy="220" r="214" fill="url(#bgClk)"/>

        <!-- Halo ambiental AZUL exterior -->
        <circle cx="220" cy="220" r="212" fill="none"
          stroke="#0078FF" stroke-width="28"
          filter="url(#haloExtB)" opacity=".55"/>

        <!-- ══ ANILLO DOBLE AZUL ══ -->
        <!-- Capa base oscura -->
        <circle cx="220" cy="220" r="210" fill="none" stroke="#001830" stroke-width="7"/>
        <!-- Neon azul -->
        <circle cx="220" cy="220" r="210" fill="none" stroke="#0090FF" stroke-width="1.8"
          filter="url(#neonB)"/>
        <!-- Línea interior sutil -->
        <circle cx="220" cy="220" r="204" fill="none"
          stroke="rgba(0,140,255,0.25)" stroke-width=".5"/>

        <!-- Separador negro entre anillos -->
        <circle cx="220" cy="220" r="198" fill="#04070E"/>

        <!-- Anillo interior azul -->
        <circle cx="220" cy="220" r="190" fill="none" stroke="#001428" stroke-width="5"/>
        <circle cx="220" cy="220" r="190" fill="none" stroke="#0080EE" stroke-width="1.4"
          filter="url(#neonB)"/>
        <circle cx="220" cy="220" r="184" fill="none"
          stroke="rgba(0,120,220,0.2)" stroke-width=".4"/>

        <!-- Esfera principal -->
        <circle cx="220" cy="220" r="180" fill="url(#bgClk)"/>

        <!-- Ticks -->
        <g id="tMin"></g>
        <g id="tHora"></g>
        <!-- Números -->
        <g id="nums"></g>

        <!-- ══ ESTRELLA 12 PUNTAS — ROJA (contraste con anillos azules) ══ -->
        <!-- Gira lentamente -->
        <g class="starGroup">
          <!-- Halo rojo de la estrella -->
          <polygon id="starHalo" fill="none" stroke="#DD1A08" stroke-width="8"
            stroke-linejoin="round" opacity=".3" filter="url(#haloStarR)"/>
          <!-- Relleno oscuro -->
          <polygon id="starFill" fill="#060A10" stroke="none" stroke-linejoin="round"/>
          <!-- Contorno neon rojo -->
          <polygon id="starNeon" fill="none" stroke="#FF2010" stroke-width="1.5"
            stroke-linejoin="round" filter="url(#neonR)"/>
        </g>

        <!-- Puntos en la estrella (fijos, no rotan) -->
        <g id="dotsRing"></g>
        <g id="dotsCross"></g>

        <!-- ══ ANILLO INTERIOR DELGADO (separa estrella de ticks) ══ -->
        <circle cx="220" cy="220" r="84" fill="none"
          stroke="rgba(0,120,255,0.12)" stroke-width="1"/>

        <!-- ══ SOMBRAS ══ -->
        <line id="shH" x1="220" y1="220" x2="220" y2="114"
          stroke="rgba(0,0,0,.8)" stroke-width="4.5" stroke-linecap="round"/>
        <line id="shM" x1="220" y1="220" x2="220" y2="90"
          stroke="rgba(0,0,0,.7)" stroke-width="3" stroke-linecap="round"/>
        <line id="shS" x1="220" y1="232" x2="220" y2="84"
          stroke="rgba(0,0,0,.5)" stroke-width="1.4" stroke-linecap="round"/>

        <!-- ══ MANECILLA HORAS — azul plateada ══ -->
        <g id="gH">
          <line x1="220" y1="238" x2="220" y2="116"
            stroke="#8AAFCC" stroke-width="3.8" stroke-linecap="round"
            filter="url(#shadHand)"/>
          <line x1="220" y1="236" x2="220" y2="120"
            stroke="#C0D8EE" stroke-width="1" stroke-linecap="round" opacity=".6"/>
        </g>

        <!-- ══ MANECILLA MINUTOS — azul claro ══ -->
        <g id="gM">
          <line x1="220" y1="242" x2="220" y2="92"
            stroke="#6898B8" stroke-width="2.5" stroke-linecap="round"
            filter="url(#shadHand)"/>
          <line x1="220" y1="240" x2="220" y2="96"
            stroke="#A8C8E0" stroke-width=".8" stroke-linecap="round" opacity=".55"/>
        </g>

        <!-- ══ MANECILLA SEGUNDOS — ROJA (contraste) ══ -->
        <g id="gS" style="animation:sGlow 1s ease-in-out infinite">
          <!-- cola -->
          <line x1="220" y1="220" x2="220" y2="242"
            stroke="#FF2010" stroke-width="1.1" stroke-linecap="round"
            filter="url(#neonSec)"/>
          <!-- cuerpo -->
          <line x1="220" y1="220" x2="220" y2="82"
            stroke="#FF2010" stroke-width=".9" stroke-linecap="round"
            filter="url(#neonSec)"/>
          <!-- contrapeso -->
          <circle cx="220" cy="238" r="2" fill="#FF2010" filter="url(#neonSec)"/>
        </g>

        <!-- ══ NÚCLEO ══ -->
        <!-- Aro azul externo -->
        <circle cx="220" cy="220" r="14" fill="#04070E"
          stroke="#0090FF" stroke-width="1.2" filter="url(#neonB)"/>
        <!-- Disco rojo -->
        <circle cx="220" cy="220" r="7" fill="#DD1A08" filter="url(#neonR)"/>
        <!-- Punto blanco -->
        <circle cx="220" cy="220" r="2.8" fill="#E0EEFF"/>

      </svg>
    </div>

    <div class="version-txt">AWAJÚN v8.0</div>

    <svg class="sparkle" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2 L13.2 10.8 L22 12 L13.2 13.2 L12 22 L10.8 13.2 L2 12 L10.8 10.8 Z"
        fill="none" stroke="#6090B0" stroke-width="1.2"/>
    </svg>

  </div><!-- /panel-right -->

</div><!-- /card -->
</div><!-- /scene -->

<script>
/* ══════════════════════════════════════════
   GEOMETRÍA RELOJ — centro (220,220)
══════════════════════════════════════════ */
const CX=220, CY=220;
const rad = d => d*Math.PI/180;
const pt  = (r,d) => ({ x:CX+r*Math.cos(rad(d)), y:CY+r*Math.sin(rad(d)) });
const NS  = 'http://www.w3.org/2000/svg';
const mk  = (t,a) => {
  const e=document.createElementNS(NS,t);
  for(const[k,v] of Object.entries(a)) e.setAttribute(k,v);
  return e;
};

function starPts(oR,iR,n,s=-90){
  return Array.from({length:n*2},(_,i)=>{
    const a=s+i*(180/n), r=i%2===0?oR:iR, p=pt(r,a);
    return `${p.x.toFixed(2)},${p.y.toFixed(2)}`;
  }).join(' ');
}

/* Estrella 12 puntas aguda */
const pts=starPts(118,55,12);
['starHalo','starFill','starNeon'].forEach(id=>
  document.getElementById(id).setAttribute('points',pts));

/* Puntos en anillo (dentro de la estrella) */
const dR=document.getElementById('dotsRing');
for(let i=0;i<12;i++){
  const p=pt(70,-90+i*30);
  dR.appendChild(mk('circle',{cx:p.x.toFixed(2),cy:p.y.toFixed(2),r:'4.8',
    fill:'#050910',stroke:'rgba(0,120,255,0.15)','stroke-width':'1'}));
}

/* Puntos cruz central */
const dC=document.getElementById('dotsCross');
[[0,0],[0,-24],[24,0],[0,24],[-24,0]].forEach(([dx,dy])=>{
  dC.appendChild(mk('circle',{
    cx:(CX+dx).toFixed(1),cy:(CY+dy).toFixed(1),r:'5.2',
    fill:'#050910',stroke:'rgba(255,26,10,0.15)','stroke-width':'.7'}));
});

/* Ticks minuto */
const tMinG=document.getElementById('tMin');
for(let i=0;i<60;i++){
  if(i%5===0) continue;
  const deg=-90+i*6, p1=pt(164,deg), p2=pt(170,deg);
  tMinG.appendChild(mk('line',{
    x1:p1.x.toFixed(2),y1:p1.y.toFixed(2),
    x2:p2.x.toFixed(2),y2:p2.y.toFixed(2),
    stroke:'rgba(0,130,255,0.18)','stroke-width':'.6','stroke-linecap':'round'}));
}

/* Ticks hora — azul */
const tHoraG=document.getElementById('tHora');
for(let i=0;i<12;i++){
  const deg=-90+i*30, isM=[0,3,6,9].includes(i);
  const p1=pt(isM?157:161,deg), p2=pt(isM?173:169,deg);
  tHoraG.appendChild(mk('line',{
    x1:p1.x.toFixed(2),y1:p1.y.toFixed(2),
    x2:p2.x.toFixed(2),y2:p2.y.toFixed(2),
    stroke:'#0090FF','stroke-width':isM?'2':'1.2','stroke-linecap':'round',
    filter:'url(#neonSoft)'}));
}

/* Números — azul */
const nG=document.getElementById('nums');
for(let i=1;i<=12;i++){
  const deg=-90+i*30, isM=[3,6,9,12].includes(i);
  const p=pt(isM?150:148,deg);
  const t=mk('text',{x:p.x.toFixed(2),y:p.y.toFixed(2),
    'font-family':'Orbitron, sans-serif',
    'font-size':isM?'17':'12','font-weight':'400',
    'dominant-baseline':'central','text-anchor':'middle',
    fill:'#0090FF',filter:'url(#neonSoft)',
    opacity:isM?'1':'0.75'});
  t.textContent=i;
  nG.appendChild(t);
}

/* ══ MANECILLAS FUNCIONALES ══ */
const gH=document.getElementById('gH');
const gM=document.getElementById('gM');
const gS=document.getElementById('gS');
const shH=document.getElementById('shH');
const shM=document.getElementById('shM');
const shS=document.getElementById('shS');

function rotar(el,deg){
  el.setAttribute('transform',`rotate(${deg.toFixed(4)},${CX},${CY})`);
}
function tickClock(){
  const now=new Date();
  const ms=now.getMilliseconds();
  const s=now.getSeconds()+ms/1000;
  const m=now.getMinutes()+s/60;
  const h=(now.getHours()%12)+m/60;
  rotar(gH,h*30);  rotar(shH,h*30);
  rotar(gM,m*6);   rotar(shM,m*6);
  rotar(gS,s*6);   rotar(shS,s*6);
}
(function loopClock(){ tickClock(); requestAnimationFrame(loopClock); })();

/* ══════════════════════════════════════════
   PANEL IZQUIERDO — patrones geométricos Awajún
   Rombos, zigzags y líneas angulares animadas
══════════════════════════════════════════ */
const geoCvs = document.getElementById('geoCvs');
const gCtx   = geoCvs.getContext('2d');

function resizeGeo(){
  const p=geoCvs.parentElement;
  geoCvs.width=p.clientWidth;
  geoCvs.height=p.clientHeight;
}
resizeGeo();
window.addEventListener('resize', resizeGeo);

/* Dibuja un rombo centrado en (x,y) con semiejes a,b */
function rombo(ctx, x, y, a, b, col, lw, alpha){
  ctx.beginPath();
  ctx.moveTo(x, y-b);
  ctx.lineTo(x+a, y);
  ctx.lineTo(x, y+b);
  ctx.lineTo(x-a, y);
  ctx.closePath();
  ctx.strokeStyle=col.replace(')',`,${alpha})`).replace('rgb','rgba');
  ctx.lineWidth=lw;
  ctx.stroke();
}

function drawGeo(t){
  const W=geoCvs.width, H=geoCvs.height;
  gCtx.clearRect(0,0,W,H);

  const pulse = Math.sin(t*0.0004);

  /* ── Zigzags horizontales (patrón Awajún textil) ──
     Distribuidos verticalmente, alternando azul y rojo */
  const zigColors = ['rgba(0,130,255', 'rgba(190,20,8'];
  const nZig = 18;
  const zigStep = H / nZig;
  const ampZ = 7;
  const waveZ = 22;

  for(let row=0; row<nZig; row++){
    const yBase = (row + 0.5) * zigStep;
    const col   = zigColors[row % 2];
    const alpha = 0.12 + 0.06 * Math.abs(Math.sin(row * 0.55 + t * 0.0003));
    const offset= (t * 0.018 * (row%2===0?1:-1)) % waveZ;

    gCtx.beginPath();
    gCtx.shadowColor = col + ',0.4)';
    gCtx.shadowBlur  = 3;

    let first=true;
    for(let x=-waveZ; x<=W+waveZ; x+=1){
      const xShifted = x + offset;
      const phase    = (xShifted % (waveZ*2)) / (waveZ*2) * Math.PI * 2;
      const y        = yBase + Math.sign(Math.sin(phase)) * ampZ;
      if(first){ gCtx.moveTo(x,y); first=false; }
      else       gCtx.lineTo(x,y);
    }
    gCtx.strokeStyle = col + `,${alpha})`;
    gCtx.lineWidth   = 0.7;
    gCtx.stroke();
  }

  /* ── Rombos concéntricos flotantes ── */
  gCtx.shadowBlur=0;

  const rombos = [
    { x:W*0.5, y:H*0.5, a:55, b:70, col:'rgb(0,130,255)', lw:0.6, phase:0    },
    { x:W*0.5, y:H*0.5, a:38, b:48, col:'rgb(190,20,8)',   lw:0.6, phase:0.5  },
    { x:W*0.5, y:H*0.5, a:22, b:28, col:'rgb(0,130,255)', lw:0.5, phase:1    },
    { x:W*0.5, y:H*0.5, a:10, b:13, col:'rgb(190,20,8)',   lw:0.5, phase:1.5  },
    /* rombos menores en esquinas */
    { x:W*0.15, y:H*0.18, a:18, b:22, col:'rgb(0,130,255)', lw:0.5, phase:0.3  },
    { x:W*0.85, y:H*0.82, a:18, b:22, col:'rgb(190,20,8)',   lw:0.5, phase:0.8  },
    { x:W*0.12, y:H*0.75, a:12, b:15, col:'rgb(0,130,255)', lw:0.4, phase:1.1  },
    { x:W*0.88, y:H*0.25, a:12, b:15, col:'rgb(190,20,8)',   lw:0.4, phase:0.6  },
  ];

  rombos.forEach(rb=>{
    const alpha = 0.18 + 0.10 * Math.sin(t * 0.0005 + rb.phase);
    const expand = 1 + 0.04 * Math.sin(t * 0.0007 + rb.phase);
    gCtx.shadowColor = rb.col.replace('rgb','rgba').replace(')',',0.5)');
    gCtx.shadowBlur  = 5;
    rombo(gCtx, rb.x, rb.y, rb.a*expand, rb.b*expand, rb.col, rb.lw, alpha);
  });

  /* ── Líneas diagonales angulares en las esquinas ── */
  gCtx.shadowBlur=0;
  const cornerLines = [
    { x1:0,   y1:0,   x2:W*0.3, y2:H*0.25, col:'rgba(0,120,255,' },
    { x1:W,   y1:0,   x2:W*0.7, y2:H*0.22, col:'rgba(190,20,8,'  },
    { x1:0,   y1:H,   x2:W*0.28,y2:H*0.78, col:'rgba(190,20,8,'  },
    { x1:W,   y1:H,   x2:W*0.72,y2:H*0.80, col:'rgba(0,120,255,' },
  ];
  cornerLines.forEach((ln,i)=>{
    const alpha=0.10+0.05*Math.sin(t*0.0004+i*0.7);
    gCtx.beginPath();
    gCtx.moveTo(ln.x1,ln.y1);
    gCtx.lineTo(ln.x2,ln.y2);
    gCtx.strokeStyle=ln.col+alpha+')';
    gCtx.lineWidth=0.7;
    gCtx.stroke();
  });
}

function animGeo(t){ drawGeo(t); requestAnimationFrame(animGeo); }
requestAnimationFrame(animGeo);

/* ══════════════════════════════════════════
   FONDO GALAXIA
══════════════════════════════════════════ */
const bgCvs=document.getElementById('bg');
const bgCtx=bgCvs.getContext('2d');
function resizeBG(){
  bgCvs.width=window.innerWidth;
  bgCvs.height=window.innerHeight;
}
resizeBG(); window.addEventListener('resize',resizeBG);

const STARS=Array.from({length:480},()=>({
  x:Math.random(), y:Math.random(),
  r:Math.random()*1.2+0.1,
  a:Math.random()*0.55+0.05,
  sp:Math.random()*0.0005+0.0001,
  ph:Math.random()*Math.PI*2,
  kind:Math.random()   // 0-0.5 blanco, 0.5-0.75 azul, 0.75-1 rojo
}));

function drawBG(t){
  const W=bgCvs.width, H=bgCvs.height;
  bgCtx.clearRect(0,0,W,H);
  bgCtx.fillStyle='#020408'; bgCtx.fillRect(0,0,W,H);

  /* Nebulosa azul derecha */
  const g1=bgCtx.createRadialGradient(W*.68,H*.44,0,W*.68,H*.44,W*.5);
  g1.addColorStop(0,'rgba(0,30,100,0.45)');
  g1.addColorStop(.45,'rgba(0,15,55,0.2)');
  g1.addColorStop(1,'rgba(0,0,0,0)');
  bgCtx.fillStyle=g1; bgCtx.fillRect(0,0,W,H);

  /* Nebulosa roja izquierda tenue */
  const g2=bgCtx.createRadialGradient(W*.2,H*.55,0,W*.2,H*.55,W*.35);
  g2.addColorStop(0,'rgba(80,8,3,0.22)');
  g2.addColorStop(1,'rgba(0,0,0,0)');
  bgCtx.fillStyle=g2; bgCtx.fillRect(0,0,W,H);

  /* Halo azul del reloj */
  const pa=0.08+0.03*Math.sin(t*0.0005);
  const g3=bgCtx.createRadialGradient(W*.62,H*.5,0,W*.62,H*.5,W*.3);
  g3.addColorStop(0,`rgba(0,60,150,${pa})`);
  g3.addColorStop(1,'rgba(0,0,0,0)');
  bgCtx.fillStyle=g3; bgCtx.fillRect(0,0,W,H);

  STARS.forEach(s=>{
    const br=s.a*(0.4+0.6*Math.sin(t*s.sp*1000+s.ph));
    bgCtx.beginPath();
    bgCtx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    bgCtx.fillStyle = s.kind<0.5
      ? `rgba(200,215,255,${br})`
      : s.kind<0.75
      ? `rgba(80,150,255,${br})`
      : `rgba(255,120,90,${br*0.5})`;
    bgCtx.fill();
  });
}
function animBG(t){ drawBG(t); requestAnimationFrame(animBG); }
requestAnimationFrame(animBG);
</script>
<script>
/* ── Awajún self-scaling: adapts to any viewport/iframe size ── */
(function(){
  var SEL = '.card', NAT_W = 980, NAT_H = 380;
  function _fit(){
    var el = document.querySelector(SEL);
    if(!el) return;
    var s = Math.min(window.innerWidth / NAT_W, window.innerHeight / NAT_H) * 0.94;
    el.style.transform       = 'scale(' + s + ')';
    el.style.transformOrigin = 'center center';
  }
  window.addEventListener('resize', _fit);
  [0, 60, 200, 500].forEach(function(t){ setTimeout(_fit, t); });
})();
</script>
